<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設置 Bryanho 管理員 - 股票預測模型</title>
    <meta name="theme-color" content="#0a0e1a">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .setup-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: #0b1220;
            border: 1px solid #1f2937;
            border-radius: 10px;
            color: #e5e7eb;
        }
        .setup-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .setup-header h1 {
            color: #3b82f6;
            margin-bottom: 10px;
        }
        .setup-form {
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #94a3b8;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #374151;
            border-radius: 6px;
            background: #0a0e1a;
            color: #e5e7eb;
            font-size: 16px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .btn-setup {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-setup:hover {
            background: #2563eb;
        }
        .btn-setup:disabled {
            background: #6b7280;
            cursor: not-allowed;
        }
        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }
        .status-success {
            background: #065f46;
            color: #10b981;
            border: 1px solid #10b981;
        }
        .status-error {
            background: #7f1d1d;
            color: #ef4444;
            border: 1px solid #ef4444;
        }
        .status-info {
            background: #1e3a8a;
            color: #60a5fa;
            border: 1px solid #60a5fa;
        }
        .instructions {
            background: #1f2937;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 30px;
        }
        .instructions h3 {
            color: #fbbf24;
            margin-bottom: 15px;
        }
        .instructions ol {
            margin: 0;
            padding-left: 20px;
        }
        .instructions li {
            margin-bottom: 8px;
            color: #d1d5db;
        }
    </style>
</head>
<body>
    <div class="setup-container">
        <div class="setup-header">
            <h1>🔧 設置 Bryanho 管理員</h1>
            <p>為股票預測模型創建管理員帳戶</p>
        </div>

        <div class="instructions">
            <h3>📋 設置說明</h3>
            <ol>
                <li>填寫下方表單創建 Bryanho 管理員帳戶</li>
                <li>創建成功後，您可以使用這些憑證登入系統</li>
                <li>登入後可以訪問 <code>/admin.html</code> 進行用戶管理</li>
                <li>建議首次登入後立即修改密碼</li>
            </ol>
        </div>

        <form class="setup-form" id="setupForm">
            <div class="form-group">
                <label for="username">用戶名</label>
                <input type="text" id="username" name="username" value="Bryanho" required>
            </div>
            
            <div class="form-group">
                <label for="email">郵箱</label>
                <input type="email" id="email" name="email" value="bryanho@stockpredictor.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">密碼</label>
                <input type="password" id="password" name="password" value="Bryanho123" required>
            </div>
            
            <div class="form-group">
                <label for="fullName">全名</label>
                <input type="text" id="fullName" name="fullName" value="Bryan Ho" required>
            </div>
            
            <button type="submit" class="btn-setup" id="setupBtn">
                創建管理員帳戶
            </button>
        </form>

        <div id="statusMessage" class="status-message" style="display: none;"></div>
    </div>

    <script>
        document.getElementById('setupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const setupBtn = document.getElementById('setupBtn');
            const statusMessage = document.getElementById('statusMessage');
            
            // 禁用按鈕
            setupBtn.disabled = true;
            setupBtn.textContent = '創建中...';
            statusMessage.style.display = 'none';
            
            try {
                const formData = new FormData(e.target);
                const userData = {
                    username: formData.get('username'),
                    email: formData.get('email'),
                    password: formData.get('password'),
                    fullName: formData.get('fullName')
                };
                
                // 使用專門的管理員設置API
                const setupResponse = await fetch('/api/setup/admin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(userData)
                });
                
                const setupResult = await setupResponse.json();
                
                if (!setupResponse.ok) {
                    throw new Error(setupResult.error || '設置失敗');
                }
                
                // 設置成功
                showStatus('success', `✅ ${setupResult.message}<br><br>
                    <strong>登入資訊：</strong><br>
                    用戶名: ${userData.username}<br>
                    密碼: ${userData.password}<br>
                    角色: 管理員<br><br>
                    <strong>下一步：</strong><br>
                    1. 訪問 <a href="/login.html" style="color: #60a5fa;">登入頁面</a><br>
                    2. 使用上述憑證登入<br>
                    3. 訪問 <a href="/admin.html" style="color: #60a5fa;">管理頁面</a> 進行用戶管理`);
                
            } catch (error) {
                console.error('Setup error:', error);
                showStatus('error', `❌ 設置失敗: ${error.message}`);
            } finally {
                setupBtn.disabled = false;
                setupBtn.textContent = '創建管理員帳戶';
            }
        });
        
        function showStatus(type, message) {
            const statusMessage = document.getElementById('statusMessage');
            statusMessage.className = `status-message status-${type}`;
            statusMessage.innerHTML = message;
            statusMessage.style.display = 'block';
        }
    </script>
</body>
</html>

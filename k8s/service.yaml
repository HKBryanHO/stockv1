apiVersion: v1
kind: Service
metadata:
  name: trading-app-service
  namespace: trading-system
spec:
  selector:
    app: trading-app
  ports:
  - name: api
    port: 3001
    targetPort: 3001
  - name: frontend
    port: 8080
    targetPort: 8080
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: trading-system
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: trading-system
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP

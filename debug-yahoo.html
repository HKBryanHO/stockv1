<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yahoo Finance API 調試</title>
    <meta name="backend-base" content="https://www.bma-hk.com">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #1a1a1a; color: #fff; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #333; border-radius: 5px; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        .info { color: #60a5fa; }
        button { padding: 10px 20px; margin: 5px; background: #3b82f6; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #2563eb; }
        pre { background: #2a2a2a; padding: 10px; border-radius: 5px; overflow-x: auto; }
        input { padding: 8px; margin: 5px; background: #333; color: white; border: 1px solid #555; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>🔍 Yahoo Finance API 調試工具</h1>
    
    <div class="test-section">
        <h3>1. 後端配置檢查</h3>
        <div id="backend-config"></div>
    </div>
    
    <div class="test-section">
        <h3>2. 健康檢查</h3>
        <button onclick="testHealth()">測試健康檢查</button>
        <div id="health-result"></div>
    </div>
    
    <div class="test-section">
        <h3>3. Yahoo Quote API 測試</h3>
        <input type="text" id="quote-symbol" placeholder="股票代號 (例如: AAPL)" value="AAPL">
        <button onclick="testQuote()">測試 Quote API</button>
        <div id="quote-result"></div>
    </div>
    
    <div class="test-section">
        <h3>4. Yahoo Chart API 測試</h3>
        <input type="text" id="chart-symbol" placeholder="股票代號 (例如: AAPL)" value="AAPL">
        <select id="chart-range">
            <option value="3mo">3個月</option>
            <option value="6mo" selected>6個月</option>
            <option value="1y">1年</option>
        </select>
        <button onclick="testChart()">測試 Chart API</button>
        <div id="chart-result"></div>
    </div>
    
    <div class="test-section">
        <h3>5. 完整測試</h3>
        <input type="text" id="full-symbol" placeholder="股票代號 (例如: AAPL)" value="AAPL">
        <button onclick="runFullTest()">運行完整測試</button>
        <div id="full-result"></div>
    </div>

    <script>
        // 獲取後端配置
        const metaBackend = document.querySelector('meta[name="backend-base"]');
        const backendBase = metaBackend ? metaBackend.getAttribute('content').trim() : 'https://www.bma-hk.com';
        
        // 顯示後端配置
        document.getElementById('backend-config').innerHTML = `
            <p><strong>後端 URL:</strong> <span class="info">${backendBase}</span></p>
            <p><strong>Quote API:</strong> <span class="info">${backendBase}/api/yahoo/quote</span></p>
            <p><strong>Chart API:</strong> <span class="info">${backendBase}/api/yahoo/chart</span></p>
        `;
        
        async function testHealth() {
            const resultDiv = document.getElementById('health-result');
            resultDiv.innerHTML = '<p class="info">正在測試健康檢查...</p>';
            
            try {
                const response = await fetch(`${backendBase}/api/health`);
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <p class="success">✅ 健康檢查成功</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <p class="error">❌ 健康檢查失敗: ${response.status}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <p class="error">❌ 健康檢查錯誤: ${error.message}</p>
                `;
            }
        }
        
        async function testQuote() {
            const symbol = document.getElementById('quote-symbol').value.trim();
            const resultDiv = document.getElementById('quote-result');
            
            if (!symbol) {
                resultDiv.innerHTML = '<p class="error">請輸入股票代號</p>';
                return;
            }
            
            resultDiv.innerHTML = '<p class="info">正在測試 Quote API...</p>';
            
            try {
                const url = `${backendBase}/api/yahoo/quote?symbol=${encodeURIComponent(symbol)}`;
                console.log('Testing quote URL:', url);
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (response.ok) {
                    const quote = data?.quoteResponse?.result?.[0];
                    if (quote) {
                        resultDiv.innerHTML = `
                            <p class="success">✅ Quote API 成功</p>
                            <p><strong>股票:</strong> ${quote.symbol}</p>
                            <p><strong>名稱:</strong> ${quote.shortName || quote.longName}</p>
                            <p><strong>價格:</strong> $${quote.regularMarketPrice || 'N/A'}</p>
                            <p><strong>貨幣:</strong> ${quote.currency}</p>
                            <details>
                                <summary>完整響應</summary>
                                <pre>${JSON.stringify(data, null, 2)}</pre>
                            </details>
                        `;
                    } else {
                        resultDiv.innerHTML = `
                            <p class="error">❌ Quote API 返回空結果</p>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        `;
                    }
                } else {
                    resultDiv.innerHTML = `
                        <p class="error">❌ Quote API 失敗: ${response.status}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <p class="error">❌ Quote API 錯誤: ${error.message}</p>
                `;
            }
        }
        
        async function testChart() {
            const symbol = document.getElementById('chart-symbol').value.trim();
            const range = document.getElementById('chart-range').value;
            const resultDiv = document.getElementById('chart-result');
            
            if (!symbol) {
                resultDiv.innerHTML = '<p class="error">請輸入股票代號</p>';
                return;
            }
            
            resultDiv.innerHTML = '<p class="info">正在測試 Chart API...</p>';
            
            try {
                const url = `${backendBase}/api/yahoo/chart?symbol=${encodeURIComponent(symbol)}&range=${encodeURIComponent(range)}&interval=1d`;
                console.log('Testing chart URL:', url);
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (response.ok) {
                    const chart = data?.chart?.result?.[0];
                    if (chart) {
                        const timestamps = chart.timestamp || [];
                        const quote = chart.indicators?.quote?.[0] || {};
                        const closes = quote.close || [];
                        
                        resultDiv.innerHTML = `
                            <p class="success">✅ Chart API 成功</p>
                            <p><strong>股票:</strong> ${chart.meta?.symbol}</p>
                            <p><strong>數據點數:</strong> ${timestamps.length}</p>
                            <p><strong>收盤價數量:</strong> ${closes.length}</p>
                            <p><strong>最新價格:</strong> $${closes[closes.length - 1] || 'N/A'}</p>
                            <details>
                                <summary>完整響應 (前500字符)</summary>
                                <pre>${JSON.stringify(data, null, 2).substring(0, 500)}...</pre>
                            </details>
                        `;
                    } else {
                        resultDiv.innerHTML = `
                            <p class="error">❌ Chart API 返回空結果</p>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        `;
                    }
                } else {
                    resultDiv.innerHTML = `
                        <p class="error">❌ Chart API 失敗: ${response.status}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <p class="error">❌ Chart API 錯誤: ${error.message}</p>
                `;
            }
        }
        
        async function runFullTest() {
            const symbol = document.getElementById('full-symbol').value.trim();
            const resultDiv = document.getElementById('full-result');
            
            if (!symbol) {
                resultDiv.innerHTML = '<p class="error">請輸入股票代號</p>';
                return;
            }
            
            resultDiv.innerHTML = '<p class="info">正在運行完整測試...</p>';
            
            let results = [];
            
            // 測試健康檢查
            try {
                const healthResponse = await fetch(`${backendBase}/api/health`);
                results.push(`健康檢查: ${healthResponse.ok ? '✅' : '❌'} (${healthResponse.status})`);
            } catch (error) {
                results.push(`健康檢查: ❌ (${error.message})`);
            }
            
            // 測試 Quote API
            try {
                const quoteResponse = await fetch(`${backendBase}/api/yahoo/quote?symbol=${encodeURIComponent(symbol)}`);
                const quoteData = await quoteResponse.json();
                const hasQuote = quoteData?.quoteResponse?.result?.[0];
                results.push(`Quote API: ${hasQuote ? '✅' : '❌'} (${quoteResponse.status})`);
            } catch (error) {
                results.push(`Quote API: ❌ (${error.message})`);
            }
            
            // 測試 Chart API
            try {
                const chartResponse = await fetch(`${backendBase}/api/yahoo/chart?symbol=${encodeURIComponent(symbol)}&range=3mo&interval=1d`);
                const chartData = await chartResponse.json();
                const hasChart = chartData?.chart?.result?.[0];
                results.push(`Chart API: ${hasChart ? '✅' : '❌'} (${chartResponse.status})`);
            } catch (error) {
                results.push(`Chart API: ❌ (${error.message})`);
            }
            
            resultDiv.innerHTML = `
                <h4>完整測試結果:</h4>
                <ul>
                    ${results.map(r => `<li>${r}</li>`).join('')}
                </ul>
            `;
        }
        
        // 頁面加載時自動運行健康檢查
        window.onload = testHealth;
    </script>
</body>
</html>

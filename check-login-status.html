<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>檢查登入狀態</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #0f172a;
            color: #e2e8f0;
        }
        .status-box {
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .success {
            background: #10b981;
            color: white;
        }
        .error {
            background: #ef4444;
            color: white;
        }
        .warning {
            background: #f59e0b;
            color: white;
        }
        .info {
            background: #3b82f6;
            color: white;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #2563eb;
        }
        pre {
            background: #1e293b;
            padding: 15px;
            border-radius: 6px;
            overflow: auto;
        }
    </style>
</head>
<body>
    <h1>🔍 檢查登入狀態</h1>
    
    <div id="statusContainer"></div>
    
    <div>
        <button onclick="checkLoginStatus()">檢查登入狀態</button>
        <button onclick="testQueryLogging()">測試查詢記錄</button>
        <button onclick="window.location.href='/login.html'">前往登入</button>
        <button onclick="window.location.href='/admin-queries.html'">查看查詢記錄</button>
    </div>
    
    <div id="resultContainer"></div>
    
    <script>
        async function checkLoginStatus() {
            const container = document.getElementById('statusContainer');
            container.innerHTML = '<div class="status-box info">正在檢查登入狀態...</div>';
            
            try {
                // 檢查用戶資料
                const response = await fetch('/api/users/profile', {
                    credentials: 'include'
                });
                
                if (response.ok) {
                    const user = await response.json();
                    container.innerHTML = `
                        <div class="status-box success">
                            <h3>✅ 已登入</h3>
                            <p><strong>用戶名:</strong> ${user.username}</p>
                            <p><strong>角色:</strong> ${user.role}</p>
                            <p><strong>郵箱:</strong> ${user.email}</p>
                            <p><strong>狀態:</strong> ${user.status}</p>
                            <p><strong>API配額:</strong> ${user.api_quota}</p>
                            <p><strong>API使用:</strong> ${user.api_usage}</p>
                        </div>
                    `;
                } else if (response.status === 401) {
                    container.innerHTML = `
                        <div class="status-box error">
                            <h3>❌ 未登入</h3>
                            <p>請先登入系統才能記錄查詢</p>
                            <button onclick="window.location.href='/login.html'">前往登入</button>
                        </div>
                    `;
                } else {
                    const error = await response.json().catch(() => ({ error: 'Unknown error' }));
                    container.innerHTML = `
                        <div class="status-box error">
                            <h3>❌ 檢查失敗</h3>
                            <p>狀態碼: ${response.status}</p>
                            <p>錯誤: ${JSON.stringify(error)}</p>
                        </div>
                    `;
                }
            } catch (error) {
                container.innerHTML = `
                    <div class="status-box error">
                        <h3>❌ 請求失敗</h3>
                        <p>錯誤: ${error.message}</p>
                    </div>
                `;
            }
        }
        
        async function testQueryLogging() {
            const resultContainer = document.getElementById('resultContainer');
            resultContainer.innerHTML = '<div class="status-box info">正在測試查詢記錄...</div>';
            
            try {
                // 測試股票查詢記錄
                const response = await fetch('/api/log-stock-query', {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        symbol: 'TEST',
                        query: '測試查詢 - 30天',
                        result: '預測價格: $100.00, 信心度: 85.0%',
                        price: 100.00,
                        change: 2.5
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    resultContainer.innerHTML = `
                        <div class="status-box success">
                            <h3>✅ 查詢記錄成功</h3>
                            <p>消息: ${data.message}</p>
                            <p>查詢ID: ${data.queryId}</p>
                            <button onclick="window.location.href='/admin-queries.html'">查看查詢記錄</button>
                        </div>
                    `;
                } else if (response.status === 401) {
                    resultContainer.innerHTML = `
                        <div class="status-box error">
                            <h3>❌ 未授權</h3>
                            <p>請先登入系統</p>
                            <button onclick="window.location.href='/login.html'">前往登入</button>
                        </div>
                    `;
                } else {
                    const error = await response.json().catch(() => ({ error: 'Unknown error' }));
                    resultContainer.innerHTML = `
                        <div class="status-box error">
                            <h3>❌ 查詢記錄失敗</h3>
                            <p>狀態碼: ${response.status}</p>
                            <p>錯誤: ${JSON.stringify(error)}</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultContainer.innerHTML = `
                    <div class="status-box error">
                        <h3>❌ 請求失敗</h3>
                        <p>錯誤: ${error.message}</p>
                    </div>
                `;
            }
        }
        
        // 頁面加載時自動檢查登入狀態
        window.addEventListener('DOMContentLoaded', checkLoginStatus);
    </script>
</body>
</html>

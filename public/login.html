<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - 股票預測模型</title>
    <meta name="theme-color" content="#0a0e1a">
    <link rel="stylesheet" href="/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .login-wrap { max-width: 420px; margin: 12vh auto; background: #0b1220; border: 1px solid #1f2937; border-radius: 10px; padding: 24px; color:#e5e7eb; }
        .login-wrap h1 { margin: 0 0 12px 0; font-size: 20px; }
        .login-wrap label { display:block; margin: 10px 0 6px 0; }
        .login-wrap input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #374151; background:#0a0e1a; color:#e5e7eb; }
        .login-wrap .btn { width: 100%; margin-top: 14px; }
        .help { color:#94a3b8; font-size: 12px; margin-top: 10px; }
        .err { color: #ef4444; margin-top: 8px; min-height: 18px; }
    </style>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('loginForm');
        const errEl = document.getElementById('err');
        const next = new URLSearchParams(location.search).get('next') || '/predictor';
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errEl.textContent = '';
            const fd = new FormData(form);
            const username = (fd.get('username')||'').toString().trim();
            const password = (fd.get('password')||'').toString();
            try {
                const resp = await fetch('/auth/login?next=' + encodeURIComponent(next), {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, next })
                });
                const j = await resp.json();
                if (!resp.ok || j.error) { errEl.textContent = j.error || '登入失敗'; return; }
                location.href = j.next || next;
            } catch (e) {
                errEl.textContent = '網絡錯誤，請稍後再試';
            }
        });
    });
    </script>
</head>
<body>
    <div class="login-wrap">
        <h1>登入</h1>
        <form id="loginForm">
            <label for="username">使用者</label>
            <input id="username" name="username" type="text" placeholder="admin" required>
            <label for="password">密碼</label>
            <input id="password" name="password" type="password" required>
            <button class="btn btn-primary" type="submit">登入</button>
            <div id="err" class="err"></div>
            <div class="help">僅限授權人員使用。忘記密碼請聯絡管理員。</div>
        </form>
    </div>
</body>
</html>

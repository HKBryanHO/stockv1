<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>回測功能測試</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #0a0e1a;
            color: #ffffff;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .test-section {
            background: #1a1f2e;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            border: 1px solid #2d3748;
        }
        .btn {
            background: #4299e1;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        .btn:hover {
            background: #3182ce;
        }
        .result {
            background: #2d3748;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .error {
            background: #742a2a;
            border: 1px solid #fc8181;
        }
        .success {
            background: #22543d;
            border: 1px solid #68d391;
        }
        input, select {
            background: #2d3748;
            color: white;
            border: 1px solid #4a5568;
            padding: 8px;
            border-radius: 4px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 回測功能測試</h1>
        
        <div class="test-section">
            <h2>1. 測試數據源狀態</h2>
            <button class="btn" onclick="testDataSourceStatus()">檢查數據源</button>
            <div id="sourceStatus" class="result" style="display: none;"></div>
        </div>
        
        <div class="test-section">
            <h2>2. 測試回測API</h2>
            <div>
                <label>股票代號: </label>
                <input type="text" id="symbol" value="AAPL" placeholder="例如: AAPL">
                
                <label>預測天數: </label>
                <select id="period">
                    <option value="5">5天</option>
                    <option value="10">10天</option>
                    <option value="20">20天</option>
                </select>
                
                <label>回測天數: </label>
                <select id="lookbackDays">
                    <option value="30">30天</option>
                    <option value="60">60天</option>
                    <option value="90" selected>90天</option>
                </select>
            </div>
            <button class="btn" onclick="testBacktestAPI()">運行回測</button>
            <div id="backtestResult" class="result" style="display: none;"></div>
        </div>
        
        <div class="test-section">
            <h2>3. 測試認證狀態</h2>
            <button class="btn" onclick="checkAuthStatus()">檢查認證</button>
            <div id="authStatus" class="result" style="display: none;"></div>
        </div>
    </div>

    <script>
        async function testDataSourceStatus() {
            const resultDiv = document.getElementById('sourceStatus');
            resultDiv.style.display = 'block';
            resultDiv.textContent = '正在檢查數據源...';
            
            try {
                const response = await fetch('/api/backtest/sources');
                const data = await response.json();
                
                resultDiv.className = 'result success';
                resultDiv.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '錯誤: ' + error.message;
            }
        }
        
        async function testBacktestAPI() {
            const resultDiv = document.getElementById('backtestResult');
            resultDiv.style.display = 'block';
            resultDiv.textContent = '正在運行回測...';
            
            const symbol = document.getElementById('symbol').value;
            const period = parseInt(document.getElementById('period').value);
            const lookbackDays = parseInt(document.getElementById('lookbackDays').value);
            
            try {
                const response = await fetch('/api/backtest/run', {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        symbol: symbol,
                        period: period,
                        lookbackDays: lookbackDays,
                        models: ['lstm', 'gbm', 'arima', 'prophet']
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                resultDiv.className = 'result success';
                resultDiv.textContent = `回測成功！\n\n` + 
                    `總交易次數: ${data.summary.totalTrades}\n` +
                    `勝率: ${(data.summary.winRate * 100).toFixed(1)}%\n` +
                    `總回報: ${(data.summary.totalReturn * 100).toFixed(2)}%\n` +
                    `夏普比率: ${data.summary.sharpeRatio.toFixed(3)}\n\n` +
                    `完整結果:\n` + JSON.stringify(data, null, 2);
                    
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '錯誤: ' + error.message;
            }
        }
        
        async function checkAuthStatus() {
            const resultDiv = document.getElementById('authStatus');
            resultDiv.style.display = 'block';
            resultDiv.textContent = '正在檢查認證狀態...';
            
            try {
                const response = await fetch('/api/users/profile', {
                    credentials: 'include'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.className = 'result success';
                    resultDiv.textContent = '已認證: ' + JSON.stringify(data, null, 2);
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = `認證失敗: HTTP ${response.status}`;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '認證檢查錯誤: ' + error.message;
            }
        }
        
        // 頁面加載時自動檢查數據源
        window.onload = function() {
            testDataSourceStatus();
        };
    </script>
</body>
</html>

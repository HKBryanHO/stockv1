<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用戶管理 - 股票預測模型</title>
    <meta name="theme-color" content="#0a0e1a">
    <link rel="stylesheet" href="/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .admin-container { max-width: 1200px; margin: 0 auto; padding: 20px; color: #e5e7eb; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .admin-header h1 { margin: 0; font-size: 28px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #0b1220; border: 1px solid #1f2937; border-radius: 10px; padding: 20px; text-align: center; }
        .stat-card h3 { margin: 0 0 10px 0; color: #94a3b8; font-size: 14px; text-transform: uppercase; }
        .stat-card .value { font-size: 32px; font-weight: 700; color: #3b82f6; }
        .users-section { background: #0b1220; border: 1px solid #1f2937; border-radius: 10px; padding: 20px; }
        .users-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .users-table { width: 100%; border-collapse: collapse; }
        .users-table th, .users-table td { padding: 12px; text-align: left; border-bottom: 1px solid #1f2937; }
        .users-table th { background: #1f2937; color: #e5e7eb; font-weight: 600; }
        .users-table tr:hover { background: #1f2937; }
        .role-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .role-admin { background: #dc2626; color: white; }
        .role-user { background: #059669; color: white; }
        .role-premium { background: #7c3aed; color: white; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .status-active { background: #059669; color: white; }
        .status-inactive { background: #6b7280; color: white; }
        .status-suspended { background: #dc2626; color: white; }
        .action-buttons { display: flex; gap: 8px; }
        .btn-small { padding: 6px 12px; font-size: 12px; }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 20px; }
        .pagination button { padding: 8px 16px; border: 1px solid #374151; background: #0a0e1a; color: #e5e7eb; border-radius: 6px; cursor: pointer; }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        .pagination button.active { background: #3b82f6; border-color: #3b82f6; }
        .loading { text-align: center; padding: 40px; color: #94a3b8; }
        .error { color: #ef4444; text-align: center; padding: 20px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0b1220; border: 1px solid #1f2937; border-radius: 10px; padding: 30px; min-width: 400px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { margin: 0; }
        .close-btn { background: none; border: none; color: #94a3b8; font-size: 24px; cursor: pointer; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #374151; border-radius: 6px; background: #0a0e1a; color: #e5e7eb; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>用戶管理</h1>
            <div>
                <button class="btn btn-secondary" onclick="location.href='/predictor'">返回預測器</button>
                <button class="btn btn-primary" onclick="showCreateUserModal()">創建用戶</button>
            </div>
        </div>

        <!-- 統計卡片 -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <h3>總用戶數</h3>
                <div class="value" id="totalUsers">-</div>
            </div>
            <div class="stat-card">
                <h3>活躍用戶</h3>
                <div class="value" id="activeUsers">-</div>
            </div>
            <div class="stat-card">
                <h3>管理員</h3>
                <div class="value" id="adminUsers">-</div>
            </div>
            <div class="stat-card">
                <h3>最近登入</h3>
                <div class="value" id="recentUsers">-</div>
            </div>
        </div>

        <!-- 用戶列表 -->
        <div class="users-section">
            <div class="users-header">
                <h2>用戶列表</h2>
                <div>
                    <button class="btn btn-secondary btn-small" onclick="refreshUsers()">刷新</button>
                </div>
            </div>
            
            <div id="usersContent">
                <div class="loading">載入中...</div>
            </div>
        </div>
    </div>

    <!-- 編輯用戶模態框 -->
    <div id="editUserModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>編輯用戶</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="editUserForm">
                <div class="form-group">
                    <label for="editRole">角色</label>
                    <select id="editRole" name="role">
                        <option value="user">用戶</option>
                        <option value="admin">管理員</option>
                        <option value="premium">高級用戶</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editStatus">狀態</label>
                    <select id="editStatus" name="status">
                        <option value="active">活躍</option>
                        <option value="inactive">非活躍</option>
                        <option value="suspended">已暫停</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editApiQuota">API 配額</label>
                    <input id="editApiQuota" name="api_quota" type="number" min="0" step="100">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let currentUserId = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadUserStats();
            loadUsers();
        });

        async function loadUserStats() {
            try {
                const response = await fetch('/api/admin/users?limit=1');
                const data = await response.json();
                
                if (response.ok && data.stats) {
                    document.getElementById('totalUsers').textContent = data.stats.total_users || 0;
                    document.getElementById('activeUsers').textContent = data.stats.active_users || 0;
                    document.getElementById('adminUsers').textContent = data.stats.admin_users || 0;
                    document.getElementById('recentUsers').textContent = data.stats.recent_users || 0;
                }
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        async function loadUsers() {
            const content = document.getElementById('usersContent');
            content.innerHTML = '<div class="loading">載入中...</div>';

            try {
                const response = await fetch(`/api/admin/users?page=${currentPage}&limit=20`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to load users');
                }

                if (data.users && data.users.length > 0) {
                    renderUsersTable(data.users, data.pagination);
                } else {
                    content.innerHTML = '<div class="error">沒有找到用戶</div>';
                }
            } catch (error) {
                console.error('Failed to load users:', error);
                content.innerHTML = `<div class="error">載入失敗: ${error.message}</div>`;
            }
        }

        function renderUsersTable(users, pagination) {
            const content = document.getElementById('usersContent');
            
            let html = `
                <table class="users-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>用戶名</th>
                            <th>郵箱</th>
                            <th>姓名</th>
                            <th>角色</th>
                            <th>狀態</th>
                            <th>API 配額</th>
                            <th>創建時間</th>
                            <th>最後登入</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            users.forEach(user => {
                const roleClass = `role-${user.role}`;
                const statusClass = `status-${user.status}`;
                const createdDate = new Date(user.created_at).toLocaleDateString();
                const lastLogin = user.last_login ? new Date(user.last_login).toLocaleDateString() : '從未';
                const apiUsage = user.api_usage || 0;
                const apiQuota = user.api_quota || 1000;

                html += `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.username}</td>
                        <td>${user.email}</td>
                        <td>${user.full_name || '-'}</td>
                        <td><span class="role-badge ${roleClass}">${user.role}</span></td>
                        <td><span class="status-badge ${statusClass}">${user.status}</span></td>
                        <td>${apiUsage}/${apiQuota}</td>
                        <td>${createdDate}</td>
                        <td>${lastLogin}</td>
                        <td>
                            <div class="action-buttons">
                                <button class="btn btn-primary btn-small" onclick="editUser(${user.id})">編輯</button>
                                <button class="btn btn-danger btn-small" onclick="deleteUser(${user.id})">刪除</button>
                            </div>
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';

            // 添加分頁
            if (pagination.total > pagination.limit) {
                const totalPages = Math.ceil(pagination.total / pagination.limit);
                html += '<div class="pagination">';
                
                // 上一頁
                html += `<button ${currentPage <= 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">上一頁</button>`;
                
                // 頁碼
                for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
                    const activeClass = i === currentPage ? 'active' : '';
                    html += `<button class="${activeClass}" onclick="changePage(${i})">${i}</button>`;
                }
                
                // 下一頁
                html += `<button ${currentPage >= totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">下一頁</button>`;
                
                html += '</div>';
            }

            content.innerHTML = html;
        }

        function changePage(page) {
            currentPage = page;
            loadUsers();
        }

        function refreshUsers() {
            loadUserStats();
            loadUsers();
        }

        async function editUser(userId) {
            currentUserId = userId;
            const modal = document.getElementById('editUserModal');
            modal.style.display = 'block';

            // 這裡可以加載用戶詳細信息
            // 為了簡化，我們直接顯示編輯表單
        }

        async function deleteUser(userId) {
            if (!confirm('確定要刪除這個用戶嗎？此操作無法撤銷。')) {
                return;
            }

            try {
                const response = await fetch(`/api/admin/users/${userId}`, {
                    method: 'DELETE'
                });

                const result = await response.json();

                if (response.ok) {
                    alert('用戶已刪除');
                    refreshUsers();
                } else {
                    alert('刪除失敗: ' + result.error);
                }
            } catch (error) {
                console.error('Delete user error:', error);
                alert('刪除失敗: ' + error.message);
            }
        }

        function closeModal() {
            document.getElementById('editUserModal').style.display = 'none';
            currentUserId = null;
        }

        function showCreateUserModal() {
            // 這裡可以實現創建用戶的模態框
            alert('創建用戶功能需要進一步實現');
        }

        // 編輯用戶表單提交
        document.getElementById('editUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!currentUserId) return;

            const formData = new FormData(e.target);
            const updates = Object.fromEntries(formData.entries());

            try {
                const response = await fetch(`/api/admin/users/${currentUserId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updates)
                });

                const result = await response.json();

                if (response.ok) {
                    alert('用戶已更新');
                    closeModal();
                    refreshUsers();
                } else {
                    alert('更新失敗: ' + result.error);
                }
            } catch (error) {
                console.error('Update user error:', error);
                alert('更新失敗: ' + error.message);
            }
        });

        // 點擊模態框外部關閉
        window.onclick = function(event) {
            const modal = document.getElementById('editUserModal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>

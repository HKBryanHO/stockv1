<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>測試登入 - 股票預測模型</title>
    <meta name="theme-color" content="#0a0e1a">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .test-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: #0b1220;
            border: 1px solid #1f2937;
            border-radius: 10px;
            color: #e5e7eb;
        }
        .test-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .test-form {
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #94a3b8;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #374151;
            border-radius: 6px;
            background: #0a0e1a;
            color: #e5e7eb;
            font-size: 16px;
        }
        .btn-test {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-test:hover {
            background: #2563eb;
        }
        .btn-test:disabled {
            background: #6b7280;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }
        .result-success {
            background: #065f46;
            color: #10b981;
            border: 1px solid #10b981;
        }
        .result-error {
            background: #7f1d1d;
            color: #ef4444;
            border: 1px solid #ef4444;
        }
        .result-info {
            background: #1e3a8a;
            color: #60a5fa;
            border: 1px solid #60a5fa;
        }
        .credentials {
            background: #1f2937;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 30px;
        }
        .credentials h3 {
            color: #fbbf24;
            margin-bottom: 15px;
        }
        .credentials code {
            background: #374151;
            padding: 4px 8px;
            border-radius: 4px;
            color: #e5e7eb;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <div class="test-header">
            <h1>🧪 測試管理員登入</h1>
            <p>診斷和測試管理員帳戶登入問題</p>
        </div>

        <div class="credentials">
            <h3>📋 測試憑證</h3>
            <p><strong>用戶名:</strong> <code>admin</code></p>
            <p><strong>密碼:</strong> <code>Admin1234!</code></p>
            <p><strong>角色:</strong> 管理員</p>
        </div>

        <form class="test-form" id="testForm">
            <div class="form-group">
                <label for="username">用戶名</label>
                <input type="text" id="username" name="username" value="admin" required>
            </div>
            
            <div class="form-group">
                <label for="password">密碼</label>
                <input type="password" id="password" name="password" value="Admin1234!" required>
            </div>
            
            <button type="submit" class="btn-test" id="testBtn">
                測試登入
            </button>
        </form>

        <div id="result" class="result" style="display: none;"></div>
    </div>

    <script>
        document.getElementById('testForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const testBtn = document.getElementById('testBtn');
            const result = document.getElementById('result');
            
            // 禁用按鈕
            testBtn.disabled = true;
            testBtn.textContent = '測試中...';
            result.style.display = 'none';
            
            try {
                const formData = new FormData(e.target);
                const loginData = {
                    username: formData.get('username'),
                    password: formData.get('password')
                };
                
                console.log('測試登入:', loginData);
                
                // 測試登入端點
                const loginResponse = await fetch('/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(loginData)
                });
                
                const loginResult = await loginResponse.json();
                console.log('登入響應:', loginResult);
                
                if (loginResponse.ok && loginResult.ok) {
                    showResult('success', `✅ 登入成功！<br><br>
                        <strong>用戶信息:</strong><br>
                        用戶名: ${loginResult.user?.username}<br>
                        角色: ${loginResult.user?.role}<br><br>
                        <strong>下一步:</strong><br>
                        <a href="/admin.html" style="color: #60a5fa;">前往管理頁面</a> | 
                        <a href="/index.html" style="color: #60a5fa;">前往預測頁面</a>`);
                } else {
                    showResult('error', `❌ 登入失敗<br><br>
                        <strong>錯誤信息:</strong><br>
                        ${loginResult.error || '未知錯誤'}<br><br>
                        <strong>可能的原因:</strong><br>
                        1. 用戶名或密碼不正確<br>
                        2. 數據庫未正確初始化<br>
                        3. 用戶帳戶不存在<br>
                        4. 服務器配置問題`);
                }
                
            } catch (error) {
                console.error('測試錯誤:', error);
                showResult('error', `❌ 測試失敗: ${error.message}<br><br>
                    <strong>可能的原因:</strong><br>
                    1. 網絡連接問題<br>
                    2. 服務器未運行<br>
                    3. API端點不可用`);
            } finally {
                testBtn.disabled = false;
                testBtn.textContent = '測試登入';
            }
        });
        
        function showResult(type, message) {
            const result = document.getElementById('result');
            result.className = `result result-${type}`;
            result.innerHTML = message;
            result.style.display = 'block';
        }
    </script>
</body>
</html>

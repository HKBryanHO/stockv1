<!DOCTYPE html>
<html lang="zh-HK">
<head>

    <title>BMA-HK | 主頁</title>

    <meta name="backend-base" content="">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
    <div id="app">
        <nav class="navbar">
            <div class="nav-container">
                <h1 class="nav-title">

                <div class="nav-actions">
                    <a class="btn btn-secondary btn-sm" href="/predictor">股票預測模型</a>

        <main class="main-content">

                        <li>投資組合優化與資金管理</li>
                        <li>AI 助手與數據洞察</li>
                    </ul>
                </section>

                <section class="panel-section">
                    <h3 style="margin: 0 0 12px 0;">工具導航</h3>
                    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap:12px;">
                        <a href="/predictor" class="card" style="display:block; padding:16px; background:#0b1220; border-radius:12px; text-decoration:none; color:#e2e8f0;">

                            <div style="color:#9aa4b2; margin-top:6px;">Markowitz + 風險預算</div>

        <footer style="text-align:center; padding:24px 0; color:#6b7280;">
